<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temp Tracker</title>
    <link rel="icon" type="image/x.icon" href="/favicon.png">

    <link rel="stylesheet" href="./estilos.css">
</head>
<body>
    <div class="contenedor">
        <div class="buscador">
            <input 
                type="text"
                placeholder="Ingresa el nombre de la ciudad"
                spellcheck="false"
                autocomplete="false"
                id="input-ciudad"
            >
            <button onclick="obtenerClima()">
                <img src="imagenes/lupa.png">
            </button>
        </div class="clima-info" id="clima-contenedor">
            <p class="clima-texto">Parcialmente nublado</p>
            <img src="imagenes/nubes.png" class="clima-icono">
            <h1 class="temp">22°c</h1>
            <h2 class="ciudad">Huancayo</h2>
            <div class="detalles">
                <div class="col">
                    <img src="imagenes/humedad.png">
                    <div>
                        <p class="humedad">50%</p>
                        <p>Humedad</p>
                    </div>
                </div>
                <div class="col">
                    <img src="imagenes/viento.png">
                    <div>
                        <p class="viento">15 km/h</p>
                        <p>Viento</p>
                    </div>
                </div>
            </div>
        <div>

        </div>
    </div>
</body>
</html>
<script src="./codigo.js"></script>
